<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-task-id="{{ task_id }}">
    <div class="card">
        <h1>{{ name }}</h1>
        <div style="color: #666; margin-top: -10px; margin-bottom: 20px;">{{ station }}</div>
        
        <div id="rejectionBannerContainer"></div>

        <div class="task-container">{{ task }}</div>
        
        <textarea id="studentCode" class="code-area" placeholder="# Wklej tutaj swój kod programu..."></textarea>

        <div class="button-group">
            <button id="helpBtn" class="btn-help" onclick="askHelp()">POMOC</button>
            <button id="mainBtn" class="btn-done" onclick="sendDone()">WYŚLIJ KOD DO OCENY</button>
        </div>

        <div class="footer">Status odświeża się automatycznie.</div>
    </div>

    <script>
        let currentTaskId = document.body.getAttribute('data-task-id');

        function fetchStatus() {
            fetch('/student_status')
            .then(res => res.json())
            .then(data => {
                const mainBtn = document.getElementById('mainBtn');
                const helpBtn = document.getElementById('helpBtn');
                const studentCode = document.getElementById('studentCode');
                const taskContainer = document.querySelector('.task-container');
                const bannerContainer = document.getElementById('rejectionBannerContainer');
                
                // 1. Scenariusz: Nauczyciel zaliczył zadanie (nastąpiła zmiana ID zadania)
                if (data.task_id !== currentTaskId) {
                    currentTaskId = data.task_id;
                    document.body.setAttribute('data-task-id', data.task_id);
                    taskContainer.innerText = data.task_text;
                    studentCode.value = ""; // Czyszczenie pola na nowe zadanie
                    studentCode.disabled = false;
                    mainBtn.disabled = false;
                    mainBtn.innerText = "WYŚLIJ KOD DO OCENY";
                    helpBtn.style.display = "inline-block";
                    bannerContainer.innerHTML = ""; // Usunięcie baneru
                    return;
                }

                // 2. Scenariusz: Kod wysłany, oczekiwanie na ocenę nauczyciela
                if (data.progress === true) {
                    studentCode.disabled = true;
                    mainBtn.disabled = true;
                    mainBtn.innerText = "OCZEKIWANIE NA OCENĘ";
                    helpBtn.style.display = "none";
                    bannerContainer.innerHTML = "";
                } 
                // 3. Scenariusz: Nauczyciel zwrócił zadanie i podał powód w komentarzu
                else if (data.progress === false && data.rejection_msg !== "") {
                    studentCode.disabled = false;
                    mainBtn.disabled = false;
                    mainBtn.innerText = "WYŚLIJ POPRAWIONY KOD";
                    helpBtn.style.display = "inline-block";
                    
                    bannerContainer.innerHTML = `
                        <div class="rejection-banner">
                            <strong>Zadanie zwrócone do poprawy:</strong><br>
                            ${data.rejection_msg}
                        </div>
                    `;
                }
            });
        }

        function askHelp() {
            fetch('/need_help', { method: 'POST' }).then(res => res.json()).then(data => {
                const btn = document.getElementById('helpBtn');
                if(data.is_helping) {
                    btn.innerText = "CZEKAJ";
                    btn.classList.add('active');
                } else {
                    btn.innerText = "POMOC";
                    btn.classList.remove('active');
                }
            });
        }

        function sendDone() {
            const studentCodeElement = document.getElementById('studentCode');
            const codeValue = studentCodeElement.value.trim();
            if(!codeValue) {
                alert("Nie możesz wysłać pustego pola tekstowego!");
                return;
            }

            if(confirm("Czy na pewno chcesz wysłać ten kod do oceny?")) {
                const body = new URLSearchParams();
                body.append('code', codeValue);

                fetch('/done', { method: 'POST', body: body }).then(res => {
                    if(res.ok) {
                        studentCodeElement.disabled = true;
                        const mainBtn = document.getElementById('mainBtn');
                        mainBtn.disabled = true;
                        mainBtn.innerText = "OCZEKIWANIE NA OCENĘ";
                        document.getElementById('helpBtn').style.display = "none";
                    }
                });
            }
        }

        // Cykliczne sprawdzanie zmian co 2 sekundy
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
