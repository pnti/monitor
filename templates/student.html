<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Ucznia - Zadanie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
</head>
<body data-task-id="{{ task_id }}">

    <div class="app-container">
        
        <div class="left-column">
            <div class="student-header">
                <h1>{{ name }}</h1>
                <div class="station-badge">{{ station }}</div>
            </div>
            
            <div id="rejectionBannerContainer"></div>

            <div class="task-section">
                <h3>Treść zadania do wykonania:</h3>
                <div class="task-container">{{ task }}</div>
            </div>
            
            <div class="footer-info">Status odświeża się automatycznie.</div>
        </div>
        
        <div class="right-column">
            <div class="editor-header">
                <h3>Kod źródłowy Python:</h3>
            </div>
            
            <textarea id="studentCode" class="code-area" placeholder="# Napisz swój program tutaj...&#10;print('Hello World')" spellcheck="false"></textarea>

            <div class="terminal-header">Konsola wyjściowa:</div>
            <pre id="output" class="terminal-box">Oczekiwanie na uruchomienie kodu...</pre>

            <div class="button-group">
                <button id="helpBtn" class="btn-help" onclick="askHelp()">POMOC</button>
                <button id="runBtn" class="btn-run" onclick="runPythonCode()">URUCHOM KOD</button>
                <button id="mainBtn" class="btn-done" onclick="sendDone()">WYŚLIJ DO OCENY</button>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='student_script.js') }}"></script>
</body>
</html>
